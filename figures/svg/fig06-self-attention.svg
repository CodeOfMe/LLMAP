<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="460" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  <text x="410" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Self-Attention Intuition: What Do Q, K, V Actually Compute?</text>
  <text x="410" y="55" text-anchor="middle" font-size="10" fill="#909090">Ref: [Vaswani et al., 2017]</text>
  
  <rect x="30" y="70" width="370" height="240" rx="10" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1.5"/>
  <text x="215" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#353535">📚 Library Analogy</text>
  <text x="215" y="110" text-anchor="middle" font-size="9" fill="#303030">You walk into a library to find books</text>
  
  <text x="50" y="135" font-size="10" fill="#2D2D2D" font-weight="700">Q (Query) = Your question</text>
  <rect x="50" y="140" width="320" height="35" rx="4" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
  <text x="210" y="160" text-anchor="middle" font-size="9" fill="#2D2D2D">"I want a book about attention mechanisms"</text>
  
  <text x="50" y="190" font-size="10" fill="#303030" font-weight="700">K (Key) = Book category labels</text>
  <rect x="50" y="195" width="320" height="35" rx="4" fill="#D5D5D5" stroke="#585858" stroke-width="1"/>
  <text x="60" y="210" font-size="8" fill="#303030">📖 Deep Learning</text>
  <text x="150" y="210" font-size="8" fill="#303030">📖 Attention</text>
  <text x="230" y="210" font-size="8" fill="#303030">📖 NLP</text>
  <text x="290" y="210" font-size="8" fill="#303030">📖 Python Programming</text>
  
  <text x="50" y="245" font-size="10" fill="#3D3D3D" font-weight="700">V (Value) = Book contents</text>
  <rect x="50" y="250" width="320" height="35" rx="4" fill="#E5E0E5" stroke="#5D5D60" stroke-width="1"/>
  <text x="210" y="268" text-anchor="middle" font-size="9" fill="#3D3D3D">The truly valuable knowledge in each book</text>
  
  <text x="50" y="298" font-size="9" fill="#4E4E4E">Matching process:</text>
  <text x="50" y="310" font-size="9" fill="#4E4E4E">Your question(Q) × Book labels(K) → Match scores</text>
  <text x="50" y="322" font-size="9" font-weight="600" fill="#4E4E4E">High-scoring books' content(V) → Information you get</text>
  
  <rect x="420" y="70" width="380" height="250" rx="10" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="610" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D2D">🔢 Mathematical Formulation</text>
  
  <text x="440" y="115" font-size="11" font-weight="600" fill="#1A1A1A">Input: X ∈ ℝ^(L×d)</text>
  <text x="440" y="135" font-size="11" fill="#2D2D2D">Q = X · W_Q,  K = X · W_K,  V = X · W_V</text>
  <text x="440" y="155" font-size="10" fill="#6A6A6A">W_Q, W_K, W_V ∈ ℝ^(d×d_k)  Learnable parameters</text>
  
  <line x1="440" y1="165" x2="780" y2="165" stroke="#8A8A8A" stroke-width="1"/>
  
  <text x="440" y="185" font-size="11" font-weight="600" fill="#1A1A1A">Attention scores (scaled dot-product):</text>
  <text x="440" y="205" font-size="12" fill="#404040" font-weight="700">S = (Q · K^T) / √d_k</text>
  <text x="440" y="222" font-size="10" fill="#6A6A6A">Divide by √d_k to prevent dot products from growing too large and saturating softmax</text>
  <text x="440" y="237" font-size="10" fill="#6A6A6A">[Vaswani et al., 2017] original paper Section 3.2.1</text>
  
  <line x1="440" y1="245" x2="780" y2="245" stroke="#8A8A8A" stroke-width="1"/>
  
  <text x="440" y="265" font-size="11" font-weight="600" fill="#1A1A1A">Add causal mask (Decoder):</text>
  <text x="440" y="285" font-size="11" fill="#3D3D3D">S = S + M,  M_ij = -∞ if i &lt; j</text>
  <text x="440" y="300" font-size="10" fill="#6A6A6A">Prevents position i from seeing position j (j&gt;i)</text>
  
  <line x1="440" y1="310" x2="780" y2="310" stroke="#8A8A8A" stroke-width="1"/>
  
  <text x="440" y="330" font-size="11" font-weight="600" fill="#1A1A1A">Final output:</text>
  <text x="440" y="350" font-size="12" fill="#4D4D4D" font-weight="700">Output = softmax(S) · V</text>
  <text x="440" y="365" font-size="10" fill="#6A6A6A">Each token's output is a weighted average of all V</text>
  <text x="440" y="380" font-size="10" fill="#6A6A6A">Weights determined by Q-K similarity</text>
  
  <rect x="30" y="330" width="370" height="130" rx="10" fill="#FFFFFF" stroke="#C8C8C8" stroke-width="1"/>
  <text x="215" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">Computation Complexity Comparison</text>
  
  <text x="50" y="375" font-size="10" fill="#404040" font-weight="600">Self-Attention: O(L² × d)</text>
  <text x="50" y="392" font-size="9" fill="#6A6A6A">Every pair of tokens computes attention</text>
  <text x="50" y="405" font-size="9" fill="#6A6A6A">Long sequences cause computation explosion → Infeasible at L=100K</text>
  
  <text x="50" y="425" font-size="10" fill="#4D4D4D" font-weight="600">RNN/LSTM: O(L × d²)</text>
  <text x="50" y="442" font-size="9" fill="#6A6A6A">Linear in sequence length</text>
  <text x="50" y="455" font-size="9" fill="#6A6A6A">But cannot parallelize, poor long-range dependencies</text>
  
  <rect x="420" y="340" width="380" height="110" rx="10" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  <text x="610" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#2D2D2D">Scaled Dot-Product Attention Formula</text>
  <text x="610" y="382" text-anchor="middle" font-size="10" fill="#3D3D3D">Attention(Q, K, V) = softmax(QK^T / √d_k) · V</text>
  <text x="610" y="402" text-anchor="middle" font-size="9" fill="#6A6A6A">Q, K, V are the query, key, value matrices</text>
  <text x="610" y="418" text-anchor="middle" font-size="9" fill="#6A6A6A">d_k is the Key vector dimension (scaling factor)</text>
  <text x="610" y="434" text-anchor="middle" font-size="9" fill="#6A6A6A">softmax ensures weights are non-negative and sum to 1</text>
  <text x="610" y="448" text-anchor="middle" font-size="8" fill="#909090">[Vaswani et al., 2017] Eq. (1)</text>
</svg>