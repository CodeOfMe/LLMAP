<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="380" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">System Monitoring Dashboard</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Tracking, Evaluation, Defense, Cost Control</text>
  
  <!-- Metrics -->
  <rect x="30" y="80" width="360" height="140" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="210" y="105" text-anchor="middle" font-size="12" fill="#1A1A1A" font-weight="700">Core Metrics</text>
  
  <rect x="45" y="115" width="150" height="85" rx="6" fill="#D8D8D8" stroke="#8E8E8E"/>
  <text x="120" y="135" text-anchor="middle" font-size="10" fill="#3A3A3A" font-weight="600">Success Rate</text>
  <text x="120" y="160" text-anchor="middle" font-size="22" fill="#4D4D4D" font-weight="700">94.2%</text>
  <text x="120" y="180" text-anchor="middle" font-size="8" fill="#6A6A6A">Threshold: ≥90%</text>
  <text x="120" y="193" text-anchor="middle" font-size="8" fill="#4D4D4D">✓ Normal</text>
  
  <rect x="215" y="115" width="150" height="85" rx="6" fill="#E8E8E0" stroke="#909088"/>
  <text x="290" y="135" text-anchor="middle" font-size="10" fill="#353535" font-weight="600">P99 Latency</text>
  <text x="290" y="160" text-anchor="middle" font-size="22" fill="#505050" font-weight="700">8.3s</text>
  <text x="290" y="180" text-anchor="middle" font-size="8" fill="#6A6A6A">Threshold: ≤10s</text>
  <text x="290" y="193" text-anchor="middle" font-size="8" fill="#505050">⚠ Near Threshold</text>
  
  <!-- Defense -->
  <rect x="410" y="80" width="360" height="140" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="590" y="105" text-anchor="middle" font-size="12" fill="#1A1A1A" font-weight="700">Security</text>
  
  <rect x="425" y="115" width="330" height="90" rx="6" fill="#DCDCDC" stroke="#9A9A9A"/>
  <text x="590" y="135" text-anchor="middle" font-size="10" fill="#2D2D2D" font-weight="600">3-Layer Defense</text>
  <text x="590" y="155" text-anchor="middle" font-size="9" fill="#6A6A6A">Input Filter → Output Filter → Prompt Hardening</text>
  <text x="590" y="175" text-anchor="middle" font-size="9" fill="#6A6A6A">Injection attack block rate: 85-90%</text>
  <text x="590" y="195" text-anchor="middle" font-size="9" fill="#6A6A6A">Residual risk: 10-15% (requires human review)</text>
  
  <!-- Cost -->
  <rect x="30" y="240" width="740" height="130" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" font-size="12" fill="#1A1A1A" font-weight="700">Cost Control: Model-Tiered Routing</text>
  
  <rect x="45" y="280" width="170" height="75" rx="6" fill="#D8D8D8" stroke="#8E8E8E"/>
  <text x="130" y="300" text-anchor="middle" font-size="9" fill="#3A3A3A" font-weight="600">Simple Tasks (60%)</text>
  <text x="130" y="320" text-anchor="middle" font-size="16" fill="#4D4D4D" font-weight="700">qwen3.5:2b</text>
  <text x="130" y="340" text-anchor="middle" font-size="8" fill="#6A6A6A">$0.0001/request</text>
  
  <rect x="235" y="280" width="170" height="75" rx="6" fill="#E8E8E0" stroke="#909088"/>
  <text x="320" y="300" text-anchor="middle" font-size="9" fill="#353535" font-weight="600">Medium Tasks (30%)</text>
  <text x="320" y="320" text-anchor="middle" font-size="16" fill="#505050" font-weight="700">Claude Haiku</text>
  <text x="320" y="340" text-anchor="middle" font-size="8" fill="#6A6A6A">$0.001/request</text>
  
  <rect x="425" y="280" width="170" height="75" rx="6" fill="#DCDCDC" stroke="#9A9A9A"/>
  <text x="510" y="300" text-anchor="middle" font-size="9" fill="#2D2D2D" font-weight="600">Complex Tasks (10%)</text>
  <text x="510" y="320" text-anchor="middle" font-size="16" fill="#404040" font-weight="700">GPT-4o</text>
  <text x="510" y="340" text-anchor="middle" font-size="8" fill="#6A6A6A">$0.01/request</text>
  
  <rect x="615" y="280" width="140" height="75" rx="6" fill="#F0F0F0" stroke="#909090"/>
  <text x="685" y="300" text-anchor="middle" font-size="9" fill="#4E4E4E" font-weight="600">Savings</text>
  <text x="685" y="325" text-anchor="middle" font-size="18" fill="#4E4E4E" font-weight="700">~85%</text>
  <text x="685" y="343" text-anchor="middle" font-size="8" fill="#6A6A6A">vs All GPT-4o</text>
</svg>