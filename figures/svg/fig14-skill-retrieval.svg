<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="380" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Two-Stage Skill Retrieval</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Keyword matching is fast but coarse, LLM ranking is accurate but slow</text>
  
  <!-- User input -->
  <rect x="300" y="80" width="200" height="40" rx="8" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-size="11" fill="#2D2D2D" font-weight="600">User Input</text>
  
  <line x1="400" y1="120" x2="400" y2="145" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Stage 1 -->
  <rect x="30" y="145" width="350" height="100" rx="10" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="205" y="170" text-anchor="middle" font-size="13" fill="#353535" font-weight="700">Stage 1: Coarse Filter (Keywords/BM25)</text>
  <text x="205" y="190" text-anchor="middle" font-size="9" fill="#484848">50 skills → 5 candidates</text>
  <text x="205" y="210" text-anchor="middle" font-size="9" fill="#484848">Fast · Millisecond · High Recall</text>
  <text x="205" y="230" text-anchor="middle" font-size="9" fill="#484848">Lower precision, contains noise</text>
  
  <line x1="380" y1="195" x2="420" y2="195" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Stage 2 -->
  <rect x="420" y="145" width="350" height="100" rx="10" fill="#D8D8D8" stroke="#555555" stroke-width="2"/>
  <text x="595" y="170" text-anchor="middle" font-size="13" fill="#3A3A3A" font-weight="700">Stage 2: Fine Ranking (LLM Semantic Match)</text>
  <text x="595" y="190" text-anchor="middle" font-size="9" fill="#404040">5 candidates → 1-2 best skills</text>
  <text x="595" y="210" text-anchor="middle" font-size="9" fill="#404040">High Precision · Semantic Understanding</text>
  <text x="595" y="230" text-anchor="middle" font-size="9" fill="#404040">Slower, but acceptable given small candidate set</text>
  
  <!-- Result -->
  <line x1="400" y1="245" x2="400" y2="270" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="300" y="270" width="200" height="50" rx="8" fill="#2D2D2D" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#F8F8F8" font-weight="600">Best Skill</text>
  <text x="400" y="308" text-anchor="middle" font-size="9" fill="#909090">Execute tool call</text>
  
  <!-- Benefits -->
  <rect x="30" y="340" width="740" height="40" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-size="10" fill="#4E4E4E">Two-stage design balances speed and accuracy: coarse filter quickly narrows scope, fine ranking ensures correct selection</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>
