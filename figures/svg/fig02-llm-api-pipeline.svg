<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
  
  <rect x="10" y="10" width="800" height="500" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Two Paths: Local to Cloud LLM APIs</text>
  <text x="410" y="55" text-anchor="middle" font-size="10" fill="#909090">Local models need no API key, data never leaves your machine, code switches seamlessly [Ollama, 2025] [Kwon et al., 2023]</text>
  
  <rect x="30" y="70" width="370" height="430" rx="12" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="2"/>
  <text x="215" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#3A3A3A">Local Deployment (Ollama)</text>
  <text x="215" y="112" text-anchor="middle" font-size="9" fill="#4D4D4D">Zero Cost · Data Private · No Rate Limit</text>
  
  <rect x="50" y="125" width="330" height="42" rx="6" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
  <text x="68" y="145" font-size="10" fill="#2D2D2D" font-weight="600">① ollama pull qwen3.5:2b</text>
  <text x="68" y="158" font-size="8" fill="#4A4A4A">Download model ≈2.7GB (Q4 quantization)</text>
  
  <line x1="215" y1="167" x2="215" y2="178" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow4)"/>
  
  <rect x="50" y="182" width="330" height="42" rx="6" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1"/>
  <text x="68" y="202" font-size="10" fill="#353535" font-weight="600">② ollama serve</text>
  <text x="68" y="215" font-size="8" fill="#444444">Start HTTP service localhost:11434</text>
  
  <line x1="215" y1="224" x2="215" y2="235" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow4)"/>
  
  <rect x="50" y="239" width="330" height="55" rx="6" fill="#FFFFFF" stroke="#6A6A6A" stroke-width="1"/>
  <text x="68" y="256" font-size="10" fill="#1A1A1A" font-weight="600">③ Python Call (OpenAI format)</text>
  <text x="68" y="270" font-size="8" fill="#4E4E4E">client = OpenAI(base_url="http://localhost:11434/v1")</text>
  <text x="68" y="284" font-size="8" fill="#4E4E4E">model="qwen3.5:2b"</text>
  
  <line x1="215" y1="294" x2="215" y2="308" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow4)"/>
  
  <rect x="50" y="312" width="330" height="95" rx="6" fill="#FFFFFF" stroke="#909090" stroke-width="1"/>
  <text x="215" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">Hardware Reference</text>
  <text x="68" y="348" font-size="9" fill="#4E4E4E">qwen3.5:0.8b → 1.0GB (integrated GPU ok)</text>
  <text x="68" y="363" font-size="9" fill="#4E4E4E">qwen3.5:2b → 2.7GB (integrated GPU ok)</text>
  <text x="68" y="378" font-size="9" fill="#4E4E4E">qwen3.5:9b → 6.6GB (RTX 4060 8GB)</text>
  <text x="68" y="393" font-size="9" fill="#4E4E4E">qwen3.5:27b → 17GB (RTX 4090 24GB)</text>
  
  <rect x="50" y="412" width="330" height="42" rx="6" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1"/>
  <text x="68" y="428" font-size="9" fill="#2D2D2D" font-weight="600">Inference Speed (RTX 4090):</text>
  <text x="68" y="443" font-size="8" fill="#6A6A6A">2B: ~80-120 tok/s | 9B: ~50-80 tok/s</text>
  
  <rect x="420" y="70" width="370" height="430" rx="12" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="2"/>
  <text x="605" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#2D2D2D">Cloud API</text>
  <text x="605" y="112" text-anchor="middle" font-size="9" fill="#4A4A4A">Pay per token · Better results · Rate limited</text>
  
  <rect x="440" y="125" width="330" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="605" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">Major API Provider Comparison</text>
  
  <text x="455" y="165" font-size="9" font-weight="600" fill="#4E4E4E">Model</text>
  <text x="570" y="165" font-size="9" font-weight="600" fill="#4E4E4E">Input/1M</text>
  <text x="700" y="165" font-size="9" font-weight="600" fill="#4E4E4E">Output/1M</text>
  <line x1="440" y1="172" x2="770" y2="172" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="455" y="188" font-size="9" fill="#3D3D3D">GPT-4o</text>
  <text x="570" y="188" font-size="9" fill="#3D3D3D">$2.50</text>
  <text x="700" y="188" font-size="9" fill="#3D3D3D">$10.00</text>
  
  <text x="455" y="204" font-size="9" fill="#3D3D3D">GPT-4o mini</text>
  <text x="570" y="204" font-size="9" fill="#3D3D3D">$0.15</text>
  <text x="700" y="204" font-size="9" fill="#3D3D3D">$0.60</text>
  
  <text x="455" y="220" font-size="9" fill="#3D3D3D">Claude 3.5 Sonnet</text>
  <text x="570" y="220" font-size="9" fill="#3D3D3D">$3.00</text>
  <text x="700" y="220" font-size="9" fill="#3D3D3D">$15.00</text>
  
  <text x="455" y="236" font-size="9" fill="#3D3D3D">DeepSeek V3</text>
  <text x="570" y="236" font-size="9" fill="#3D3D3D">¥1</text>
  <text x="700" y="236" font-size="9" fill="#3D3D3D">¥2</text>
  
  <text x="455" y="252" font-size="9" fill="#3D3D3D">Qwen-Max</text>
  <text x="570" y="252" font-size="9" fill="#3D3D3D">¥2</text>
  <text x="700" y="252" font-size="9" fill="#3D3D3D">¥6</text>
  
  <text x="605" y="265" text-anchor="middle" font-size="7" fill="#909090">Source: Official model pricing, Jan 2025</text>
  
  <rect x="440" y="278" width="330" height="75" rx="6" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1"/>
  <text x="605" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#353535">Cost Warning</text>
  <text x="605" y="312" text-anchor="middle" font-size="9" fill="#303030">100 req/min × 500in + 200out tok</text>
  <text x="605" y="327" text-anchor="middle" font-size="9" fill="#303030">GPT-4o: $468/day ≈ $14,000/month</text>
  <text x="605" y="342" text-anchor="middle" font-size="9" fill="#303030">Local 2B model: $0/month</text>
  
  <rect x="440" y="360" width="330" height="130" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="605" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A1A">Seamless Switch</text>
  <text x="605" y="396" text-anchor="middle" font-size="9" fill="#4E4E4E">Just change 2 lines of code, everything else stays the same</text>
  
  <rect x="460" y="405" width="290" height="38" rx="4" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1"/>
  <text x="470" y="421" font-size="8" fill="#3A3A3A" font-weight="600">Local: base_url="http://localhost:11434/v1"</text>
  <text x="470" y="435" font-size="8" fill="#3A3A3A">api_key="ollama"</text>
  
  <rect x="460" y="448" width="290" height="38" rx="4" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="1"/>
  <text x="470" y="464" font-size="8" fill="#2D2D2D" font-weight="600">Cloud: base_url="https://api.openai.com/v1"</text>
  <text x="470" y="478" font-size="8" fill="#2D2D2D">api_key="sk-..."</text>
</svg>