<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="430" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">ReAct Paradigm: Alternating Loop of Reasoning and Action</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">数据来源：[Yao et al., 2023]</text>
  
  <!-- Main loop -->
  <rect x="30" y="80" width="740" height="340" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  
  <!-- User input -->
  <rect x="320" y="90" width="160" height="40" rx="8" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#2D2D2D" font-weight="600">User Question</text>
  
  <line x1="400" y1="130" x2="400" y2="155" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Thought -->
  <rect x="300" y="155" width="200" height="50" rx="8" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1.5"/>
  <text x="400" y="175" text-anchor="middle" font-size="11" fill="#353535" font-weight="600">Thought (Reason)</text>
  <text x="400" y="192" text-anchor="middle" font-size="8" fill="#484848">"I need to search..."</text>
  
  <line x1="400" y1="205" x2="400" y2="230" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Action -->
  <rect x="300" y="230" width="200" height="50" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1.5"/>
  <text x="400" y="250" text-anchor="middle" font-size="11" fill="#3A3A3A" font-weight="600">Action (Act)</text>
  <text x="400" y="267" text-anchor="middle" font-size="8" fill="#404040">Call search API</text>
  
  <line x1="500" y1="255" x2="580" y2="255" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Tool execution -->
  <rect x="580" y="210" width="160" height="90" rx="8" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="1.5"/>
  <text x="660" y="235" text-anchor="middle" font-size="10" fill="#505050" font-weight="600">Tool Execution</text>
  <text x="660" y="252" text-anchor="middle" font-size="8" fill="#3D3D3D">Search, compute,</text>
  <text x="660" y="265" text-anchor="middle" font-size="8" fill="#3D3D3D">DB queries, etc.</text>
  <text x="660" y="282" text-anchor="middle" font-size="8" fill="#3D3D3D">Return Observation</text>
  
  <line x1="580" y1="280" x2="500" y2="280" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <line x1="400" y1="280" x2="400" y2="310" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Observation -->
  <rect x="300" y="310" width="200" height="50" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#2D2D2D" font-weight="600">Observation (Observe)</text>
  <text x="400" y="347" text-anchor="middle" font-size="8" fill="#353535">Tool returned results</text>
  
  <!-- Loop back -->
  <path d="M 300 335 Q 250 335 250 255 Q 250 180 300 180" fill="none" stroke="#6A6A6A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="240" y="260" font-size="8" fill="#6A6A6A" text-anchor="middle">Loop until</text>
  <text x="240" y="272" font-size="8" fill="#6A6A6A" text-anchor="middle">Sufficient Info</text>
  
  <!-- Final answer -->
  <line x1="400" y1="360" x2="400" y2="385" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="320" y="385" width="160" height="40" rx="8" fill="#2D2D2D" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#F8F8F8" font-weight="600">Final Answer</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>
