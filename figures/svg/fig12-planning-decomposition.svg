<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="360" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">LLM Planning: Decompose → Prioritize → Execute</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">Multi-step planning process for complex tasks</text>
  
  <!-- Root task -->
  <rect x="250" y="80" width="320" height="45" rx="10" fill="#2D2D2D" stroke="#1A1A1A" stroke-width="2"/>
  <text x="410" y="108" text-anchor="middle" font-size="11" fill="#F8F8F8" font-weight="600">Deploy containerized microservices to K8s cluster</text>
  
  <!-- Arrows to level 1 -->
  <line x1="330" y1="125" x2="200" y2="160" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="125" x2="410" y2="160" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="125" x2="620" y2="160" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Level 1: Phase 1 -->
  <rect x="120" y="160" width="160" height="40" rx="8" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" font-size="10" fill="#2D2D2D" font-weight="600">Env Check</text>
  
  <!-- Level 1: Phase 2 -->
  <rect x="330" y="160" width="160" height="40" rx="8" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1.5"/>
  <text x="410" y="185" text-anchor="middle" font-size="10" fill="#353535" font-weight="600">Config Prep</text>
  
  <!-- Level 1: Phase 3 -->
  <rect x="540" y="160" width="160" height="40" rx="8" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="1.5"/>
  <text x="620" y="185" text-anchor="middle" font-size="10" fill="#505050" font-weight="600">Auth Verify</text>
  
  <!-- Arrows to level 2 -->
  <line x1="200" y1="200" x2="200" y2="230" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="200" x2="410" y2="230" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="200" x2="620" y2="230" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Level 2: Sub-tasks -->
  <rect x="120" y="230" width="160" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1"/>
  <text x="200" y="255" text-anchor="middle" font-size="10" fill="#3A3A3A">Confirm cluster status</text>
  
  <rect x="330" y="230" width="160" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1"/>
  <text x="410" y="255" text-anchor="middle" font-size="10" fill="#3A3A3A">Write YAML config</text>
  
  <rect x="540" y="230" width="160" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1"/>
  <text x="620" y="255" text-anchor="middle" font-size="10" fill="#3A3A3A">Check access permissions</text>
  
  <!-- Arrows to level 3 -->
  <line x1="200" y1="270" x2="200" y2="300" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="270" x2="410" y2="300" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Level 3: Execution -->
  <rect x="120" y="300" width="160" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1"/>
  <text x="200" y="325" text-anchor="middle" font-size="10" fill="#2D2D2D">Deploy App</text>
  
  <rect x="330" y="300" width="160" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1"/>
  <text x="410" y="325" text-anchor="middle" font-size="10" fill="#2D2D2D">Verify config</text>
  
  <!-- Arrows to level 4 -->
  <line x1="200" y1="340" x2="200" y2="365" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="340" x2="410" y2="365" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Level 4: Final checks -->
  <rect x="120" y="365" width="160" height="35" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="200" y="387" text-anchor="middle" font-size="9" fill="#4E4E4E">Health Check</text>
  
  <rect x="330" y="365" width="160" height="35" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="410" y="387" text-anchor="middle" font-size="9" fill="#4E4E4E">Rollback Prep</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>
