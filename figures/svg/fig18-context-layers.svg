<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="400" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Context Engineering 4-Layer Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Data source: [Liu et al., 2023] [Zheng et al., 2024]</text>
  
  <!-- Layer 1: Content -->
  <rect x="100" y="80" width="600" height="70" rx="10" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="2"/>
  <text x="130" y="105" font-size="13" fill="#2D2D2D" font-weight="700">Layer 1: Content Organization</text>
  <text x="130" y="125" font-size="9" fill="#4A4A4A">Key info at start and end · Minor info in middle · Lost in the Middle</text>
  <text x="680" y="115" text-anchor="end" font-size="9" fill="#6A6A6A">Position Optimization</text>
  
  <line x1="400" y1="150" x2="400" y2="170" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Layer 2: Compression -->
  <rect x="100" y="170" width="600" height="70" rx="10" fill="#D8D8D8" stroke="#555555" stroke-width="2"/>
  <text x="130" y="195" font-size="13" fill="#3A3A3A" font-weight="700">Layer 2: Context Compression</text>
  <text x="130" y="215" font-size="9" fill="#404040">Summary compression · Selective retention · Prompt caching · RadixAttention</text>
  <text x="680" y="205" text-anchor="end" font-size="9" fill="#6A6A6A">Length Optimization</text>
  
  <line x1="400" y1="240" x2="400" y2="260" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Layer 3: Dynamic Loading -->
  <rect x="100" y="260" width="600" height="70" rx="10" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="130" y="285" font-size="13" fill="#353535" font-weight="700">Layer 3: Dynamic Loading</text>
  <text x="130" y="305" font-size="9" fill="#484848">On-demand retrieval · Relevance evaluation · Timeliness judgment · Memory integration</text>
  <text x="680" y="295" text-anchor="end" font-size="9" fill="#6A6A6A">Content Optimization</text>
  
  <line x1="400" y1="330" x2="400" y2="350" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Layer 4: Budget -->
  <rect x="100" y="350" width="600" height="50" rx="10" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="2"/>
  <text x="130" y="372" font-size="13" fill="#505050" font-weight="700">Layer 4: Token Budget &amp; Monitoring</text>
  <text x="130" y="390" font-size="9" fill="#3D3D3D">Cost ceiling · Output length limit · Anomaly detection</text>
  <text x="680" y="380" text-anchor="end" font-size="9" fill="#6A6A6A">Cost Control</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>