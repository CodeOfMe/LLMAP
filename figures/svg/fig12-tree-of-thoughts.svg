<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="420" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Tree of Thoughts: Search Process</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">数据来源：[Yao et al., 2023]</text>
  
  <!-- Root node -->
  <rect x="350" y="80" width="120" height="40" rx="8" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="410" y="105" text-anchor="middle" font-size="11" fill="#353535" font-weight="600">Problem: 24-Game</text>
  
  <!-- Level 1 branches -->
  <line x1="410" y1="120" x2="250" y2="160" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="410" y1="120" x2="410" y2="160" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="410" y1="120" x2="570" y2="160" stroke="#4E4E4E" stroke-width="1.5"/>
  
  <!-- Level 1 nodes -->
  <rect x="180" y="160" width="140" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1.5"/>
  <text x="250" y="185" text-anchor="middle" font-size="10" fill="#3A3A3A">3 × 4 = 12</text>
  
  <rect x="340" y="160" width="140" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1.5"/>
  <text x="410" y="185" text-anchor="middle" font-size="10" fill="#3A3A3A">10 - 4 = 6</text>
  
  <rect x="500" y="160" width="140" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="570" y="185" text-anchor="middle" font-size="10" fill="#2D2D2D">5 + 2 = 7 ✗</text>
  
  <!-- Level 2 branches from node 1 -->
  <line x1="250" y1="200" x2="170" y2="240" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="250" y1="200" x2="330" y2="240" stroke="#4E4E4E" stroke-width="1.5"/>
  
  <!-- Level 2 nodes from node 1 -->
  <rect x="100" y="240" width="140" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="170" y="265" text-anchor="middle" font-size="10" fill="#2D2D2D">12 × 2 = 24 ✓</text>
  
  <rect x="260" y="240" width="140" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="330" y="265" text-anchor="middle" font-size="10" fill="#2D2D2D">12 + 10 = 22 ✗</text>
  
  <!-- Level 2 branches from node 2 -->
  <line x1="410" y1="200" x2="410" y2="240" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="410" y1="200" x2="530" y2="240" stroke="#4E4E4E" stroke-width="1.5"/>
  
  <!-- Level 2 nodes from node 2 -->
  <rect x="340" y="240" width="140" height="40" rx="8" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="410" y="265" text-anchor="middle" font-size="10" fill="#2D2D2D">6 × 5 = 30 ✗</text>
  
  <rect x="460" y="240" width="140" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="1.5"/>
  <text x="530" y="265" text-anchor="middle" font-size="10" fill="#3A3A3A">6 × 2 = 12</text>
  
  <!-- Level 3 from winning path -->
  <line x1="170" y1="280" x2="170" y2="320" stroke="#555555" stroke-width="2"/>
  
  <rect x="100" y="320" width="140" height="40" rx="8" fill="#D8D8D8" stroke="#555555" stroke-width="2"/>
  <text x="170" y="345" text-anchor="middle" font-size="10" fill="#3A3A3A" font-weight="600">24 ÷ 1 = 24 ✓</text>
  <text x="170" y="370" text-anchor="middle" font-size="8" fill="#3A3A3A">Answer Found!</text>
  
  <!-- Pruned nodes indicators -->
  <text x="330" y="290" text-anchor="middle" font-size="9" fill="#909090">✗ Prune</text>
  <text x="410" y="290" text-anchor="middle" font-size="9" fill="#909090">✗ Prune</text>
  <text x="570" y="210" text-anchor="middle" font-size="9" fill="#909090">✗ Prune</text>
  <text x="530" y="290" text-anchor="middle" font-size="9" fill="#909090">→ Continue Search</text>
  
  <!-- Legend -->
  <rect x="600" y="320" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="610" y="332" width="12" height="12" rx="2" fill="#D8D8D8" stroke="#555555" stroke-width="1"/>
  <text x="628" y="342" font-size="8" fill="#4E4E4E">Valid Path (continue search)</text>
  <rect x="610" y="350" width="12" height="12" rx="2" fill="#DCDCDC" stroke="#4D4D4D" stroke-width="1"/>
  <text x="628" y="360" font-size="8" fill="#4E4E4E">Invalid Path (pruned)</text>
  <rect x="610" y="368" width="12" height="12" rx="2" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1"/>
  <text x="628" y="378" font-size="8" fill="#4E4E4E">Original problem node</text>
  <text x="610" y="393" font-size="8" fill="#4E4E4E">BFS/DFS + Evaluator Pruning</text>
</svg>
