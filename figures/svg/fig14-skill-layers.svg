<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="320" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Skill System 3-Layer Architecture</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">Complete chain from user intent to tool execution</text>
  
  <!-- Layer 1: Decision -->
  <rect x="100" y="80" width="600" height="60" rx="10" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="2"/>
  <text x="130" y="105" font-size="13" fill="#2D2D2D" font-weight="700">Layer 1: Agent Decision Layer</text>
  <text x="130" y="125" font-size="10" fill="#4A4A4A">"User wants to find Zhang San's order in the database" — Understand user intent, decide what capability is needed</text>
  
  <!-- Arrow -->
  <line x1="400" y1="140" x2="400" y2="155" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Layer 2: Skill Selection -->
  <rect x="100" y="155" width="600" height="60" rx="10" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="130" y="180" font-size="13" fill="#353535" font-weight="700">Layer 2: Skill System (Selection Layer)</text>
  <text x="130" y="200" font-size="10" fill="#484848">Match the most relevant skill from skill registry — Keywords/BM25 Coarse Filter → LLM Semantic Ranking</text>
  
  <!-- Arrow -->
  <line x1="400" y1="215" x2="400" y2="230" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Layer 3: MCP Transport -->
  <rect x="100" y="230" width="600" height="60" rx="10" fill="#D8D8D8" stroke="#555555" stroke-width="2"/>
  <text x="130" y="255" font-size="13" fill="#3A3A3A" font-weight="700">Layer 3: MCP Client (Transport Layer)</text>
  <text x="130" y="275" font-size="10" fill="#404040">Call corresponding MCP Server via MCP protocol — Standardized tool invocation, cross-app reuse</text>
  
  <!-- Side labels -->
  <text x="720" y="110" text-anchor="end" font-size="9" fill="#6A6A6A">Intent Understanding</text>
  <text x="720" y="185" text-anchor="end" font-size="9" fill="#6A6A6A">Skill Matching</text>
  <text x="720" y="260" text-anchor="end" font-size="9" fill="#6A6A6A">Tool Execution</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>
