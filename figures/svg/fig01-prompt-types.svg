<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="400" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Three Prompt Types Compared</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">Source: [Brown et al., 2020] [Wei et al., 2022]</text>
  
  <rect x="30" y="80" width="240" height="310" rx="10" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  <text x="150" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D2D">Zero-Shot</text>
  
  <rect x="45" y="118" width="210" height="50" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="150" y="137" text-anchor="middle" font-size="9" fill="#4E4E4E">"Classify the following review as positive or negative:..."</text>
  
  <text x="150" y="190" text-anchor="middle" font-size="10" fill="#6A6A6A">✗ Unstable format</text>
  <text x="150" y="210" text-anchor="middle" font-size="10" fill="#6A6A6A">✗ Low accuracy</text>
  <text x="150" y="230" text-anchor="middle" font-size="10" fill="#6A6A6A">✓ Most concise</text>
  
  <rect x="50" y="250" width="200" height="120" rx="8" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1"/>
  <text x="150" y="272" text-anchor="middle" font-size="10" fill="#353535" font-weight="700">Baseline Accuracy</text>
  <text x="150" y="296" text-anchor="middle" font-size="24" font-weight="700" fill="#404040">54.7%</text>
  <text x="150" y="316" text-anchor="middle" font-size="8" fill="#353535">(SuperGLUE, GPT-3 175B)</text>
  <text x="150" y="338" text-anchor="middle" font-size="8" fill="#353535">Math reasoning (GSM8K): 17.9%</text>
  
  <rect x="290" y="80" width="240" height="310" rx="10" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="410" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#3A3A3A">Few-Shot</text>
  
  <rect x="305" y="118" width="210" height="50" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="410" y="135" text-anchor="middle" font-size="9" fill="#4E4E4E">Ex 1: Review → Positive</text>
  <text x="410" y="148" text-anchor="middle" font-size="9" fill="#4E4E4E">Ex 2: Review → Negative → New Review?</text>
  
  <text x="410" y="190" text-anchor="middle" font-size="10" fill="#6A6A6A">✓ Controlled format</text>
  <text x="410" y="210" text-anchor="middle" font-size="10" fill="#6A6A6A">✓ Improved accuracy</text>
  <text x="410" y="230" text-anchor="middle" font-size="10" fill="#6A6A6A">△ Consumes context space</text>
  
  <rect x="310" y="250" width="200" height="120" rx="8" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1"/>
  <text x="410" y="272" text-anchor="middle" font-size="10" fill="#353535" font-weight="700">Improved Accuracy</text>
  <text x="410" y="296" text-anchor="middle" font-size="24" font-weight="700" fill="#4D4D4D">71.8%</text>
  <text x="410" y="316" text-anchor="middle" font-size="8" fill="#353535">(SuperGLUE, GPT-3 175B)</text>
  <text x="410" y="338" text-anchor="middle" font-size="8" fill="#353535">Math reasoning (GSM8K): 17.9%</text>
  
  <rect x="550" y="80" width="240" height="310" rx="10" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="670" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#2D2D2D">Chain-of-Thought (CoT)</text>
  
  <rect x="565" y="118" width="210" height="50" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="670" y="135" text-anchor="middle" font-size="9" fill="#4E4E4E">Examples include reasoning</text>
  <text x="670" y="148" text-anchor="middle" font-size="9" fill="#4E4E4E">"Let's think step by step"</text>
  
  <text x="670" y="190" text-anchor="middle" font-size="10" fill="#6A6A6A">✓ Major reasoning boost</text>
  <text x="670" y="210" text-anchor="middle" font-size="10" fill="#6A6A6A">✓ Explainable reasoning</text>
  <text x="670" y="230" text-anchor="middle" font-size="10" fill="#6A6A6A">△ More tokens consumed</text>
  
  <rect x="570" y="250" width="200" height="120" rx="8" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1"/>
  <text x="670" y="272" text-anchor="middle" font-size="10" fill="#353535" font-weight="700">Post-Reasoning Accuracy</text>
  <text x="670" y="296" text-anchor="middle" font-size="24" font-weight="700" fill="#3D3D3D">74.0%</text>
  <text x="670" y="316" text-anchor="middle" font-size="8" fill="#353535">(SuperGLUE, PaLM-540B)</text>
  <text x="670" y="338" text-anchor="middle" font-size="8" fill="#353535">Math reasoning (GSM8K): 56.9%</text>
</svg>