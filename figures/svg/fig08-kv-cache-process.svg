<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="360" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">KV Cache: Generation With vs Without Cache</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Reference: [Kwon et al., 2023]</text>
  
  <!-- Without KV Cache -->
  <rect x="30" y="80" width="360" height="270" rx="10" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  <text x="210" y="105" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="700">No KV Cache</text>
  
  <rect x="45" y="120" width="330" height="35" rx="6" fill="#DCDCDC" stroke="#9A9A9A"/>
  <text x="210" y="142" text-anchor="middle" font-size="10" fill="#2D2D2D">Generate token 1: Compute full attention for [Prompt]</text>
  
  <rect x="45" y="165" width="330" height="35" rx="6" fill="#DCDCDC" stroke="#9A9A9A"/>
  <text x="210" y="187" text-anchor="middle" font-size="10" fill="#2D2D2D">Generate token 2: Recompute full attention for [Prompt, t1]</text>
  
  <rect x="45" y="210" width="330" height="35" rx="6" fill="#DCDCDC" stroke="#9A9A9A"/>
  <text x="210" y="232" text-anchor="middle" font-size="10" fill="#2D2D2D">Generate token 3: Recompute full attention for [Prompt, t1, t2]</text>
  
  <text x="210" y="270" text-anchor="middle" font-size="10" fill="#6A6A6A">Each step recomputes K and V for all historical tokens</text>
  <text x="210" y="290" text-anchor="middle" font-size="10" fill="#6A6A6A">Complexity: O(n × L²), n = generation steps</text>
  <text x="210" y="315" text-anchor="middle" font-size="14" fill="#404040" font-weight="700">3-5x Slower</text>
  
  <!-- With KV Cache -->
  <rect x="410" y="80" width="360" height="270" rx="10" fill="#D8D8D8" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="590" y="105" text-anchor="middle" font-size="13" fill="#3A3A3A" font-weight="700">With KV Cache</text>
  
  <rect x="425" y="120" width="330" height="35" rx="6" fill="#D8D8D8" stroke="#8E8E8E"/>
  <text x="590" y="142" text-anchor="middle" font-size="10" fill="#3A3A3A">Generate token 1: Compute K,V for [Prompt] → Store to Cache</text>
  
  <rect x="425" y="165" width="330" height="35" rx="6" fill="#D8D8D8" stroke="#8E8E8E"/>
  <text x="590" y="187" text-anchor="middle" font-size="10" fill="#3A3A3A">Generate token 2: Compute K,V for t1 + Read from Cache</text>
  
  <rect x="425" y="210" width="330" height="35" rx="6" fill="#D8D8D8" stroke="#8E8E8E"/>
  <text x="590" y="232" text-anchor="middle" font-size="10" fill="#3A3A3A">Generate token 3: Compute K,V for t2 + Read from Cache</text>
  
  <text x="590" y="270" text-anchor="middle" font-size="10" fill="#6A6A6A">K,V for historical tokens computed only once</text>
  <text x="590" y="290" text-anchor="middle" font-size="10" fill="#6A6A6A">Complexity: O(n × L), linear growth</text>
  <text x="590" y="315" text-anchor="middle" font-size="14" fill="#4D4D4D" font-weight="700">3-5x Faster</text>
</svg>
