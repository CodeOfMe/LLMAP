<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="300" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">MCP Protocol Architecture</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">数据来源：[Anthropic, 2024]</text>
  
  <!-- LLM Application -->
  <rect x="40" y="90" width="200" height="140" rx="12" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="2"/>
  <text x="140" y="120" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="700">LLM Application</text>
  <text x="140" y="140" text-anchor="middle" font-size="10" fill="#4A4A4A">(Claude / GPT-4, etc.)</text>
  <line x1="60" y1="155" x2="220" y2="155" stroke="#8A8A8A" stroke-width="1"/>
  <text x="140" y="175" text-anchor="middle" font-size="9" fill="#2D2D2D">• Generate Tool Call</text>
  <text x="140" y="192" text-anchor="middle" font-size="9" fill="#2D2D2D">• Parse Tool Result</text>
  <text x="140" y="209" text-anchor="middle" font-size="9" fill="#2D2D2D">• Multi-turn dialogue management</text>
  
  <!-- Arrow 1 -->
  <line x1="240" y1="160" x2="300" y2="160" stroke="#4E4E4E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="150" text-anchor="middle" font-size="8" fill="#6A6A6A" font-weight="600">Standard API</text>
  
  <!-- MCP Client -->
  <rect x="300" y="90" width="200" height="140" rx="12" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="400" y="120" text-anchor="middle" font-size="13" fill="#353535" font-weight="700">MCP Client</text>
  <text x="400" y="140" text-anchor="middle" font-size="10" fill="#484848">(In Host process)</text>
  <line x1="320" y1="155" x2="480" y2="155" stroke="#909088" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" font-size="9" fill="#353535">• Protocol Translation</text>
  <text x="400" y="192" text-anchor="middle" font-size="9" fill="#353535">• Connection Mgmt</text>
  <text x="400" y="209" text-anchor="middle" font-size="9" fill="#353535">• Access Control</text>
  
  <!-- Arrow 2 -->
  <line x1="500" y1="160" x2="560" y2="160" stroke="#4E4E4E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="150" text-anchor="middle" font-size="8" fill="#6A6A6A" font-weight="600">MCP Protocol</text>
  
  <!-- MCP Server -->
  <rect x="560" y="90" width="200" height="140" rx="12" fill="#D8D8D8" stroke="#555555" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-size="13" fill="#3A3A3A" font-weight="700">MCP Server</text>
  <text x="660" y="140" text-anchor="middle" font-size="10" fill="#404040">(Tool Provider)</text>
  <line x1="580" y1="155" x2="740" y2="155" stroke="#8E8E8E" stroke-width="1"/>
  <text x="660" y="175" text-anchor="middle" font-size="9" fill="#3A3A3A">• Tool Registration</text>
  <text x="660" y="192" text-anchor="middle" font-size="9" fill="#3A3A3A">• Resource Provision</text>
  <text x="660" y="209" text-anchor="middle" font-size="9" fill="#3A3A3A">• Prompt Templates</text>
  
  <!-- Bottom: Key features -->
  <rect x="40" y="250" width="720" height="40" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="400" y="275" text-anchor="middle" font-size="10" fill="#4E4E4E">MCP Core Advantages: Unified Protocol · Pluggable Tools · Cross-App Reuse · Standardized Resource Access</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>
