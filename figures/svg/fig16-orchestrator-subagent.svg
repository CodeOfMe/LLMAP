<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="360" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Orchestrator-Subagent Pattern</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">Data source: [Hong et al., 2024] [Wu et al., 2023]</text>
  
  <!-- Orchestrator -->
  <rect x="310" y="80" width="200" height="60" rx="12" fill="#2D2D2D" stroke="#1A1A1A" stroke-width="2"/>
  <text x="410" y="105" text-anchor="middle" font-size="13" fill="#F8F8F8" font-weight="700">Orchestrator</text>
  <text x="410" y="125" text-anchor="middle" font-size="9" fill="#909090">Task Decomposition · Dispatch · Monitor</text>
  
  <!-- Arrows to subagents -->
  <line x1="360" y1="140" x2="160" y2="190" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="140" x2="410" y2="190" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="140" x2="660" y2="190" stroke="#4E4E4E" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Subagent A -->
  <rect x="60" y="190" width="200" height="70" rx="10" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1.5"/>
  <text x="160" y="215" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="600">Requirements Agent</text>
  <text x="160" y="235" text-anchor="middle" font-size="9" fill="#4A4A4A">Specialized Toolset</text>
  <text x="160" y="250" text-anchor="middle" font-size="9" fill="#4A4A4A">Dedicated System Prompt</text>
  
  <!-- Subagent B -->
  <rect x="310" y="190" width="200" height="70" rx="10" fill="#D8D8D8" stroke="#555555" stroke-width="1.5"/>
  <text x="410" y="215" text-anchor="middle" font-size="12" fill="#3A3A3A" font-weight="600">Development Agent</text>
  <text x="410" y="235" text-anchor="middle" font-size="9" fill="#404040">Specialized Toolset</text>
  <text x="410" y="250" text-anchor="middle" font-size="9" fill="#404040">Dedicated System Prompt</text>
  
  <!-- Subagent C -->
  <rect x="560" y="190" width="200" height="70" rx="10" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1.5"/>
  <text x="660" y="215" text-anchor="middle" font-size="12" fill="#353535" font-weight="600">Testing Agent</text>
  <text x="660" y="235" text-anchor="middle" font-size="9" fill="#484848">Specialized Toolset</text>
  <text x="660" y="250" text-anchor="middle" font-size="9" fill="#484848">Dedicated System Prompt</text>
  
  <!-- Results flowing back -->
  <line x1="160" y1="260" x2="160" y2="300" stroke="#4E4E4E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="410" y1="260" x2="410" y2="300" stroke="#4E4E4E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="660" y1="260" x2="660" y2="300" stroke="#4E4E4E" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- Result aggregation -->
  <rect x="100" y="300" width="620" height="40" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="410" y="325" text-anchor="middle" font-size="11" fill="#4E4E4E" font-weight="600">Results Aggregation → Orchestrator Integration → Final Output</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E4E4E"/>
    </marker>
  </defs>
</svg>