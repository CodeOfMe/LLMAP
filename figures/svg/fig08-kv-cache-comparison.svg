<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="440" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">KV Cache: Core of Inference Acceleration</text>
  <text x="400" y="60" text-anchor="middle" font-size="10" fill="#909090">参考 [Kwon et al., 2023] [Vaswani et al., 2017]</text>
  
  <!-- Without KV Cache -->
  <text x="200" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#404040">No KV Cache</text>
  
  <rect x="30" y="100" width="340" height="160" rx="8" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  
  <text x="50" y="125" font-size="10" fill="#3D3D3D">Generate token 1:</text>
  <text x="50" y="140" font-size="9" fill="#6A6A6A">计算 [The, algorithm, processes, data] 的 Q, K, V</text>
  <text x="50" y="155" font-size="9" fill="#6A6A6A" font-style="italic">4 tokens → 4x4 attention = 16 ops</text>
  
  <text x="50" y="178" font-size="10" fill="#3D3D3D">Generate token 2:</text>
  <text x="50" y="193" font-size="9" fill="#6A6A6A">Recompute [The, algorithm, processes, data, efficiently]</text>
  <text x="50" y="208" font-size="9" fill="#6A6A6A" font-style="italic">5 tokens → 5x5 attention = 25 ops ⚠️ Recompute!</text>
  
  <text x="50" y="232" font-size="10" fill="#3D3D3D">Generate token 3:</text>
  <text x="50" y="247" font-size="9" fill="#6A6A6A">Recompute again 6 tokens → 36 ops ⚠️⚠️</text>
  
  <text x="200" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#404040">Total complexity: O(n² × m²)</text>
  
  <!-- With KV Cache -->
  <text x="600" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#4D4D4D">With KV Cache</text>
  
  <rect x="430" y="100" width="340" height="160" rx="8" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1.5"/>
  
  <text x="450" y="125" font-size="10" fill="#3D3D3D">Prefill Stage:</text>
  <text x="450" y="140" font-size="9" fill="#6A6A6A">Compute Q, K, V for [The, algorithm, processes, data]</text>
  <text x="450" y="155" font-size="9" fill="#6A6A6A">✓ Cache K, V vectors</text>
  
  <text x="450" y="178" font-size="10" fill="#3D3D3D">Generate token 2 (Decode):</text>
  <text x="450" y="193" font-size="9" fill="#6A6A6A">Only compute Q, K, V for "efficiently"</text>
  <text x="450" y="208" font-size="9" fill="#6A6A6A">Attention with cached K, V → 5 ops ✓</text>
  
  <text x="450" y="232" font-size="10" fill="#3D3D3D">Generate token 3 (Decode):</text>
  <text x="450" y="247" font-size="9" fill="#6A6A6A">Only compute 1 new token → attention with cache ✓</text>
  
  <text x="600" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#4D4D4D">Per-step complexity: O(n+m)</text>
  
  <!-- Why only KV, not Q -->
  <rect x="30" y="275" width="740" height="65" rx="8" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1.5"/>
  <text x="400" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#353535">Why cache only K and V, not Q?</text>
  <text x="400" y="315" text-anchor="middle" font-size="10" fill="#303030">Q is only used by the current token to compute attention weights, then discarded. K and V are needed by every future token—</text>
  <text x="400" y="330" text-anchor="middle" font-size="10" fill="#303030">"efficiently"'s Q asks "Who should I attend to?", while "The/algorithm/processes/data"'s K/V answer "Here's my info"</text>
  
  <!-- Size comparison table -->
  <rect x="30" y="355" width="740" height="85" rx="8" fill="#FFFFFF" stroke="#C8C8C8" stroke-width="1"/>
  <text x="400" y="376" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A">KV Cache Memory Usage Comparison Across Models</text>
  
  <line x1="30" y1="385" x2="770" y2="385" stroke="#E0E0E0" stroke-width="1"/>
  <text x="120" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">Model</text>
  <text x="260" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">Hidden Dim</text>
  <text x="370" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">Layers</text>
  <text x="480" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">Seq Length</text>
  <text x="600" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">KV Cache (FP16)</text>
  <text x="710" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#3D3D3D">Batch=32</text>
  
  <text x="120" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">GPT-3 175B</text>
  <text x="260" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">12,288</text>
  <text x="370" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">96</text>
  <text x="480" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">2,048</text>
  <text x="600" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">~9.2 GB</text>
  <text x="710" y="420" text-anchor="middle" font-size="9" fill="#4E4E4E">~295 GB</text>
  
  <text x="120" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">LLaMA-3 8B</text>
  <text x="260" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">4,096</text>
  <text x="370" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">32</text>
  <text x="480" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">8,192</text>
  <text x="600" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">~4.3 GB</text>
  <text x="710" y="434" text-anchor="middle" font-size="9" fill="#4E4E4E">~137 GB</text>
</svg>
