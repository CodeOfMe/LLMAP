<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="340" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">RadixAttention Radix Prefix Cache Tree</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#909090">Data source: [Zheng et al., 2024]</text>
  
  <!-- Root -->
  <circle cx="410" cy="100" r="25" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="2"/>
  <text x="410" y="105" text-anchor="middle" font-size="9" fill="#353535" font-weight="600">Root</text>
  
  <!-- Level 1 branches -->
  <line x1="410" y1="125" x2="250" y2="170" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="410" y1="125" x2="410" y2="170" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="410" y1="125" x2="570" y2="170" stroke="#4E4E4E" stroke-width="1.5"/>
  
  <!-- Level 1 nodes -->
  <rect x="180" y="170" width="140" height="35" rx="6" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
  <text x="250" y="192" text-anchor="middle" font-size="9" fill="#2D2D2D">"Tool Descriptions A"</text>
  
  <rect x="340" y="170" width="140" height="35" rx="6" fill="#D8D8D8" stroke="#555555" stroke-width="1"/>
  <text x="410" y="192" text-anchor="middle" font-size="9" fill="#3A3A3A">"Tool Descriptions B"</text>
  
  <rect x="500" y="170" width="140" height="35" rx="6" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="1"/>
  <text x="570" y="192" text-anchor="middle" font-size="9" fill="#505050">"Conversation History"</text>
  
  <!-- Level 2 from Conversation History -->
  <line x1="570" y1="205" x2="500" y2="250" stroke="#4E4E4E" stroke-width="1.5"/>
  <line x1="570" y1="205" x2="640" y2="250" stroke="#4E4E4E" stroke-width="1.5"/>
  
  <rect x="430" y="250" width="140" height="35" rx="6" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1"/>
  <text x="500" y="272" text-anchor="middle" font-size="9" fill="#353535">"User Asks Weather"</text>
  
  <rect x="570" y="250" width="140" height="35" rx="6" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="1"/>
  <text x="640" y="272" text-anchor="middle" font-size="9" fill="#353535">"User Asks Code"</text>
  
  <!-- Shared prefix indicator -->
  <rect x="30" y="100" width="120" height="80" rx="8" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1"/>
  <text x="90" y="120" text-anchor="middle" font-size="9" fill="#3A3A3A" font-weight="600">Shared Prefix</text>
  <text x="90" y="138" text-anchor="middle" font-size="8" fill="#404040">Root shared by all</text>
  <text x="90" y="152" text-anchor="middle" font-size="8" fill="#404040">requests,</text>
  <text x="90" y="166" text-anchor="middle" font-size="8" fill="#404040">No redundant computation</text>
  
  <!-- Cache hit indicator -->
  <rect x="670" y="100" width="120" height="80" rx="8" fill="#F0F0E8" stroke="#8A8A80" stroke-width="1"/>
  <text x="730" y="120" text-anchor="middle" font-size="9" fill="#353535" font-weight="600">Cache Hit</text>
  <text x="730" y="138" text-anchor="middle" font-size="8" fill="#303030">New requests reuse</text>
  <text x="730" y="152" text-anchor="middle" font-size="8" fill="#303030">existing prefix</text>
  <text x="730" y="166" text-anchor="middle" font-size="8" fill="#303030">KV Cache</text>
  
  <!-- Bottom explanation -->
  <rect x="30" y="300" width="760" height="30" rx="8" fill="#F0F0F0" stroke="#909090" stroke-width="1"/>
  <text x="410" y="320" text-anchor="middle" font-size="10" fill="#4E4E4E">RadixAttention uses a prefix tree to organize KV Cache; requests with shared prefixes reuse cached data, reducing KV Cache memory by 67-85%</text>
</svg>