<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="360" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Attention Mechanism Evolution: MHA → MQA → GQA</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Source: [Vaswani et al., 2017] [Shazeer, 2019] [Ainslie et al., 2023]</text>
  
  <rect x="30" y="80" width="230" height="260" rx="10" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  <text x="145" y="105" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="700">MHA Multi-Head Attention</text>
  
  <rect x="45" y="120" width="200" height="100" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="145" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">Q1 K1 V1</text>
  <text x="145" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">Q2 K2 V2</text>
  <text x="145" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">Q3 K3 V3</text>
  <text x="145" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">... 32 independent projections</text>
  <text x="145" y="205" text-anchor="middle" font-size="9" fill="#4E4E4E">KV Cache: 32 × head_dim</text>
  
  <text x="145" y="245" text-anchor="middle" font-size="10" fill="#6A6A6A">KV Cache: 100%</text>
  <text x="145" y="265" text-anchor="middle" font-size="10" fill="#6A6A6A">Quality: Best</text>
  <text x="145" y="285" text-anchor="middle" font-size="10" fill="#6A6A6A">Used in: GPT-3, BERT</text>
  <text x="145" y="310" text-anchor="middle" font-size="18" fill="#404040" font-weight="700">100%</text>
  <text x="145" y="328" text-anchor="middle" font-size="8" fill="#2D2D2D">KV Cache baseline</text>
  
  <rect x="285" y="80" width="230" height="260" rx="10" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-size="13" fill="#3A3A3A" font-weight="700">MQA Multi-Query Attention</text>
  
  <rect x="300" y="120" width="200" height="100" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="400" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">Q1 ─┐</text>
  <text x="400" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">Q2 ─┤ K V (shared)</text>
  <text x="400" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">Q3 ─┘</text>
  <text x="400" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">All heads share 1 set of KV</text>
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#4E4E4E">KV Cache: 1 × head_dim</text>
  
  <text x="400" y="245" text-anchor="middle" font-size="10" fill="#6A6A6A">KV Cache: 1/32</text>
  <text x="400" y="265" text-anchor="middle" font-size="10" fill="#6A6A6A">Quality: Slightly lower</text>
  <text x="400" y="285" text-anchor="middle" font-size="10" fill="#6A6A6A">Used in: Gemini</text>
  <text x="400" y="310" text-anchor="middle" font-size="18" fill="#4D4D4D" font-weight="700">3%</text>
  <text x="400" y="328" text-anchor="middle" font-size="8" fill="#3A3A3A">KV Cache reduction</text>
  
  <rect x="540" y="80" width="230" height="260" rx="10" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="655" y="105" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="700">GQA Grouped-Query Attention</text>
  
  <rect x="555" y="120" width="200" height="100" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="655" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">Q1-Q4 ─┐</text>
  <text x="655" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">Q5-Q8 ─┤ K1 V1</text>
  <text x="655" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">...     ─┘</text>
  <text x="655" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">32 Q heads / 8 KV groups</text>
  <text x="655" y="205" text-anchor="middle" font-size="9" fill="#4E4E4E">KV Cache: 8 × head_dim</text>
  
  <text x="655" y="245" text-anchor="middle" font-size="10" fill="#6A6A6A">KV Cache: 8/32 = 25%</text>
  <text x="655" y="265" text-anchor="middle" font-size="10" fill="#6A6A6A">Quality: Near MHA</text>
  <text x="655" y="285" text-anchor="middle" font-size="10" fill="#6A6A6A">Used in: LLaMA 2/3</text>
  <text x="655" y="310" text-anchor="middle" font-size="18" fill="#3D3D3D" font-weight="700">25%</text>
  <text x="655" y="328" text-anchor="middle" font-size="8" fill="#2D2D2D">KV Cache reduction</text>
</svg>