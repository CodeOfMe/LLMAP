<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="780" height="400" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="400" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A1A">Multi-Agent Collaboration Patterns</text>
  <text x="400" y="58" text-anchor="middle" font-size="10" fill="#909090">Data source: [Du et al., 2023] [Wu et al., 2023] [Hong et al., 2024]</text>
  
  <!-- Debate -->
  <rect x="30" y="80" width="230" height="300" rx="10" fill="#F0F0F0" stroke="#9A9A9A" stroke-width="1.5"/>
  <text x="145" y="105" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="700">Debate Pattern</text>
  
  <rect x="45" y="120" width="200" height="120" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="145" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">Agent A: Argument 1</text>
  <text x="145" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="145" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">Agent B: Rebuttal</text>
  <text x="145" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="145" y="200" text-anchor="middle" font-size="9" fill="#4E4E4E">Agent A: Revision</text>
  <text x="145" y="215" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓ Converges after rounds</text>
  <text x="145" y="230" text-anchor="middle" font-size="9" fill="#4E4E4E">Final Answer</text>
  
  <text x="145" y="265" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Improve Factual Accuracy</text>
  <text x="145" y="285" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Reduce Hallucination</text>
  <text x="145" y="305" text-anchor="middle" font-size="9" fill="#6A6A6A">△ High multi-round cost</text>
  <text x="145" y="330" text-anchor="middle" font-size="9" fill="#6A6A6A">+15-20% Accuracy</text>
  <text x="145" y="355" text-anchor="middle" font-size="10" fill="#404040" font-weight="600">Best for: Reasoning Tasks</text>
  
  <!-- Conversation -->
  <rect x="285" y="80" width="230" height="300" rx="10" fill="#F0F0F0" stroke="#8E8E8E" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-size="12" fill="#3A3A3A" font-weight="700">Conversation Pattern</text>
  
  <rect x="300" y="120" width="200" height="120" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="400" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">PM: Requirements</text>
  <text x="400" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="400" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">Designer: Prototype</text>
  <text x="400" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="400" y="200" text-anchor="middle" font-size="9" fill="#4E4E4E">Engineer: Challenge</text>
  <text x="400" y="215" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓ Dynamic Synergy</text>
  <text x="400" y="230" text-anchor="middle" font-size="9" fill="#4E4E4E">Final Output</text>
  
  <text x="400" y="265" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Simulates real team collaboration</text>
  <text x="400" y="285" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Multi-angle review</text>
  <text x="400" y="305" text-anchor="middle" font-size="9" fill="#6A6A6A">△ May drift off-topic</text>
  <text x="400" y="330" text-anchor="middle" font-size="9" fill="#6A6A6A">AutoGen Framework</text>
  <text x="400" y="355" text-anchor="middle" font-size="10" fill="#4D4D4D" font-weight="600">Best for: Complex Tasks</text>
  
  <!-- Pipeline -->
  <rect x="540" y="80" width="230" height="300" rx="10" fill="#F0F0F0" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="655" y="105" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="700">Pipeline Pattern</text>
  
  <rect x="555" y="120" width="200" height="120" rx="6" fill="#FFFFFF" stroke="#E2E2E2"/>
  <text x="655" y="140" text-anchor="middle" font-size="9" fill="#4E4E4E">Step 1: Research</text>
  <text x="655" y="155" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="655" y="170" text-anchor="middle" font-size="9" fill="#4E4E4E">Step 2: Writing</text>
  <text x="655" y="185" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓</text>
  <text x="655" y="200" text-anchor="middle" font-size="9" fill="#4E4E4E">Step 3: Review</text>
  <text x="655" y="215" text-anchor="middle" font-size="9" fill="#4E4E4E">    ↓ Fixed Workflow</text>
  <text x="655" y="230" text-anchor="middle" font-size="9" fill="#4E4E4E">Final Output</text>
  
  <text x="655" y="265" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Clear, controllable workflow</text>
  <text x="655" y="285" text-anchor="middle" font-size="9" fill="#6A6A6A">✓ Clear roles</text>
  <text x="655" y="305" text-anchor="middle" font-size="9" fill="#6A6A6A">△ Limited flexibility</text>
  <text x="655" y="330" text-anchor="middle" font-size="9" fill="#6A6A6A">CrewAI Framework</text>
  <text x="655" y="355" text-anchor="middle" font-size="10" fill="#3D3D3D" font-weight="600">Best for: Standardized Workflows</text>
</svg>