<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Helvetica, Arial, sans-serif">
  <rect x="10" y="10" width="800" height="500" rx="16" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="410" y="45" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A1A">BPE Tokenization Process</text>
  <text x="410" y="63" text-anchor="middle" font-size="10" fill="#909090">Ref: GPT-2 tokenizer [Radford et al., 2019] [Sennrich et al., 2016]</text>
  
  <rect x="25" y="80" width="370" height="415" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="210" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#2D2D2D">Step 1: Character-level Split</text>
  <g transform="translate(50, 125)">
    <rect x="0" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="24" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">l</text>
    <rect x="54" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">o</text>
    <rect x="108" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="132" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">w</text>
    <rect x="162" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="186" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">e</text>
    <rect x="216" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="240" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">r</text>
  </g>
  <text x="210" y="180" text-anchor="middle" font-size="9" fill="#6A6A6A">Initial vocabulary: {l, o, w, e, r, ...}</text>
  
  <text x="210" y="205" text-anchor="middle" font-size="16" fill="#909090">↓ Merge Most Frequent Pair</text>
  
  <text x="210" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#4D4D4D">Step 2: Merge l+o → lo</text>
  <g transform="translate(70, 248)">
    <rect x="0" y="0" width="64" height="34" rx="5" fill="#D5D5D5" stroke="#585858" stroke-width="1.5"/>
    <text x="32" y="22" text-anchor="middle" font-size="13" fill="#303030" font-weight="600">lo</text>
    <rect x="72" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="96" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">w</text>
    <rect x="128" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="152" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">e</text>
    <rect x="184" y="0" width="48" height="34" rx="5" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="1"/>
    <text x="208" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D">r</text>
  </g>
  <text x="210" y="303" text-anchor="middle" font-size="9" fill="#6A6A6A">Vocabulary adds: {lo}</text>
  
  <text x="210" y="325" text-anchor="middle" font-size="16" fill="#909090">↓ Continue merging</text>
  
  <text x="210" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#585858">Step 3: Merge lo+w → low, e+r → er</text>
  <g transform="translate(90, 368)">
    <rect x="0" y="0" width="80" height="34" rx="5" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="1.5"/>
    <text x="40" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="600">low</text>
    <rect x="90" y="0" width="70" height="34" rx="5" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="1.5"/>
    <text x="125" y="22" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="600">er</text>
  </g>
  <text x="210" y="423" text-anchor="middle" font-size="9" fill="#6A6A6A">Vocabulary adds: {low, er}</text>
  
  <rect x="50" y="440" width="320" height="42" rx="8" fill="#F0F0F0" stroke="#4D4D4D" stroke-width="1.5"/>
  <text x="210" y="466" text-anchor="middle" font-size="13" fill="#2D2D2D" font-weight="700">"lower" → 2 tokens: [low] [er]</text>
  
  <rect x="410" y="80" width="385" height="415" rx="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="602" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">Vocabulary Size Across Models</text>
  <text x="602" y="130" text-anchor="middle" font-size="9" fill="#909090">Source: Official model papers</text>
  
  <text x="430" y="168" font-size="11" fill="#3D3D3D" font-weight="500">GPT-2</text>
  <rect x="510" y="155" width="100" height="20" rx="4" fill="#D8D8D8" stroke="#4A4A4A" stroke-width="0.5"/>
  <text x="620" y="170" font-size="10" fill="#2D2D2D" font-weight="600">50,257</text>
  
  <text x="430" y="203" font-size="11" fill="#3D3D3D" font-weight="500">GPT-4</text>
  <rect x="510" y="190" width="140" height="20" rx="4" fill="#C5C5C5" stroke="#4A4A4A" stroke-width="0.5"/>
  <text x="660" y="205" font-size="10" fill="#2D2D2D" font-weight="600">100,256</text>
  
  <text x="430" y="238" font-size="11" fill="#3D3D3D" font-weight="500">LLaMA-2</text>
  <rect x="510" y="225" width="80" height="20" rx="4" fill="#D5D5D5" stroke="#585858" stroke-width="0.5"/>
  <text x="600" y="240" font-size="10" fill="#303030" font-weight="600">32,000</text>
  
  <text x="430" y="273" font-size="11" fill="#3D3D3D" font-weight="500">LLaMA-3</text>
  <rect x="510" y="260" width="160" height="20" rx="4" fill="#E5E5E5" stroke="#6D6D6D" stroke-width="0.5"/>
  <text x="680" y="275" font-size="10" fill="#505050" font-weight="600">128,256</text>
  
  <text x="430" y="308" font-size="11" fill="#3D3D3D" font-weight="500">Qwen3.5</text>
  <rect x="510" y="295" width="250" height="20" rx="4" fill="#E8E8E0" stroke="#5D5D5D" stroke-width="0.5"/>
  <text x="770" y="310" font-size="10" fill="#444444" font-weight="700">248,320</text>
  
  <line x1="430" y1="335" x2="770" y2="335" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="602" y="360" text-anchor="middle" font-size="11" fill="#1A1A1A" font-weight="600">Larger vocabulary = better Chinese encoding efficiency</text>
  
  <rect x="430" y="375" width="340" height="100" rx="8" fill="#F8F8F8" stroke="#C8C8C8" stroke-width="1"/>
  <text x="445" y="398" font-size="10" fill="#4E4E4E">GPT-2 Chinese: ~2.5 chars/token</text>
  <text x="445" y="418" font-size="10" fill="#4E4E4E">LLaMA-3 Chinese: ~1.3 chars/token</text>
  <text x="445" y="438" font-size="10" fill="#4E4E4E">Qwen3.5 Chinese: ~1.1 chars/token</text>
  <text x="445" y="463" font-size="9" fill="#6A6A6A">Vocabulary size directly affects inference speed and API cost</text>
</svg>